<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Usuários</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Biblioteca</h1>
    <span>Sistema de Gestão</span>
  </div>
  <div class="nav-section">
    <p class="nav-label">Menu</p>
    <a href="index.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="livros.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Livros</span>
    </a>
    <a href="usuarios.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Usuários</span>
    </a>
    <a href="emprestimos.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      <span>Empréstimos</span>
    </a>
  </div>
</nav>

<main class="main">
  <div class="page-header fade-in">
    <p class="breadcrumb">Cadastro</p>
    <h2>Usuários</h2>
    <p id="page-subtitle">Gerencie os leitores da biblioteca</p>
  </div>
  <div class="content fade-in" id="main-content"></div>
</main>

<div id="toast-container"></div>
<script type="module">
import { listarUsuarios, cadastrarUsuario, deletarUsuario } from "./api.js";
import { toast, initPage, isAdmin } from "./utils.js";

initPage();

const content = document.getElementById("main-content");
const admin = isAdmin();

if (admin) {
  renderAdmin();
} else {
  renderAccessDenied();
}

// ─── ADMIN VIEW ────────────────────────────────────────────────────────
function renderAdmin() {
  content.innerHTML = `
    <div class="stats-row" style="grid-template-columns:1fr;max-width:220px;margin-bottom:32px">
      <div class="stat-card"><p class="stat-label">Total de Usuários</p><p class="stat-value" id="count-usuarios">—</p></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <h3>Leitores cadastrados</h3>
          <span class="role-badge role-badge--admin">Admin</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>Email</th><th>Role</th><th></th></tr></thead>
            <tbody id="usuarios-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Cadastrar Usuário</h3></div>
        <div class="card-body">
          <div class="form-grid" id="form-usuario">
            <div class="field">
              <label for="nome">Nome completo</label>
              <input id="nome" type="text" placeholder="Ex: João Silva" required>
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="joao@email.com" required>
            </div>
            <div class="field">
              <label for="senha">Senha inicial</label>
              <input id="senha" type="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <button id="btn-cadastrar" class="btn btn-primary">Cadastrar</button>
          </div>
        </div>
      </div>
    </div>
  `;
  loadAdmin();
  document.getElementById("btn-cadastrar").addEventListener("click", submitCadastro);
}

async function loadAdmin() {
  const tbody = document.getElementById("usuarios-tbody");
  tbody.innerHTML = `<tr><td colspan="4"><div class="skeleton" style="width:50%"></div></td></tr>`;
  try {
    const usuarios = await listarUsuarios();
    document.getElementById("count-usuarios").textContent = usuarios.length;
    if (!usuarios.length) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">👤</div><p>Nenhum usuário cadastrado ainda</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = usuarios.map(u => `
      <tr>
        <td><strong>${u.nome}</strong></td>
        <td>${u.email}</td>
        <td>
          <span class="role-pill ${u.role === "ADMIN" ? "role-pill--admin" : "role-pill--user"}">
            ${u.role === "ADMIN" ? "Admin" : "Usuário"}
          </span>
        </td>
        <td><button class="btn btn-danger btn-sm btn-delete" data-id="${u.id}">Remover</button></td>
      </tr>
    `).join("");
    document.querySelectorAll(".btn-delete").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("Remover este usuário?")) return;
        try { await deletarUsuario(btn.dataset.id); toast("Usuário removido"); loadAdmin(); }
        catch (e) { toast(e.message, "error"); }
      });
    });
  } catch {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">⚠</div><p>Erro ao carregar usuários</p></div></td></tr>`;
  }
}

async function submitCadastro() {
  const btn = document.getElementById("btn-cadastrar");
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  if (!nome || !email || !senha) { toast("Preencha todos os campos.", "error"); return; }
  btn.disabled = true; btn.textContent = "Salvando…";
  try {
    await cadastrarUsuario({ nome, email, senha });
    toast("Usuário cadastrado com sucesso");
    document.getElementById("nome").value = "";
    document.getElementById("email").value = "";
    document.getElementById("senha").value = "";
    loadAdmin();
  } catch (e) { toast(e.message, "error"); }
  finally { btn.disabled = false; btn.textContent = "Cadastrar"; }
}

// ─── USER VIEW: acesso negado elegante ─────────────────────────────────
function renderAccessDenied() {
  document.getElementById("page-subtitle").textContent = "Área restrita";
  content.innerHTML = `
    <div class="access-denied">
      <div class="access-denied-icon">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h3>Acesso restrito</h3>
      <p>Esta área é exclusiva para administradores do sistema.</p>
      <a href="index.html" class="btn btn-ghost" style="margin-top:8px">Voltar ao Dashboard</a>
    </div>
  `;
}
</script>
</body>
</html>
