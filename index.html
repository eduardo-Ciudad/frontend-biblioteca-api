<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Biblioteca</h1>
    <span>Sistema de Gestão</span>
  </div>
  <div class="nav-section">
    <p class="nav-label">Menu</p>
    <a href="index.html" class="nav-link active">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="livros.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Livros</span>
    </a>
    <a href="usuarios.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Usuários</span>
    </a>
    <a href="emprestimos.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      <span>Empréstimos</span>
    </a>
  </div>
</nav>

<main class="main">
  <div class="page-header fade-in">
    <p class="breadcrumb">Sistema</p>
    <h2>Dashboard</h2>
    <p>Visão geral do acervo e empréstimos ativos</p>
  </div>
  <div class="content fade-in">
    <div class="stats-row" id="stats">
      <div class="stat-card"><p class="stat-label">Total de Livros</p><p class="stat-value" id="s-livros">—</p></div>
      <div class="stat-card"><p class="stat-label">Usuários</p><p class="stat-value" id="s-usuarios">—</p></div>
      <div class="stat-card"><p class="stat-label">Empréstimos Ativos</p><p class="stat-value" id="s-emp">—</p></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Empréstimos recentes</h3>
        <a href="emprestimos.html" class="btn btn-ghost btn-sm">Ver todos</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Livro</th><th>Usuário</th><th>Data</th><th>Status</th></tr></thead>
          <tbody id="emp-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script type="module">
import { listarLivros, listarUsuarios, listarEmprestimos } from "./js/api.js";
import { fmtDate } from "./js/utils.js";

async function load() {
  const [livros, usuarios, emprestimos] = await Promise.all([listarLivros(), listarUsuarios(), listarEmprestimos()]);
  document.getElementById("s-livros").textContent = livros.length;
  document.getElementById("s-usuarios").textContent = usuarios.length;
  document.getElementById("s-emp").textContent = emprestimos.filter(e => e.ativo).length;

  const tbody = document.getElementById("emp-tbody");
  const recentes = [...emprestimos].slice(0, 8);
  if (!recentes.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">🔄</div><p>Nenhum empréstimo ainda</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = recentes.map(e => `
    <tr>
      <td><strong>${e.tituloLivro ?? "—"}</strong></td>
      <td>${e.nomeUsuario ?? "—"}</td>
      <td>${fmtDate(e.dataEmprestimo)}</td>
      <td><span class="badge ${e.ativo ? "badge-active" : "badge-available"}"><span class="badge-dot"></span>${e.ativo ? "Em andamento" : "Devolvido"}</span></td>
    </tr>
  `).join("");
}
load();
</script>
</body>
</html>
