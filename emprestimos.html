<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Empréstimos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Biblioteca</h1>
    <span>Sistema de Gestão</span>
  </div>
  <div class="nav-section">
    <p class="nav-label">Menu</p>
    <a href="index.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="livros.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Livros</span>
    </a>
    <a href="usuarios.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Usuários</span>
    </a>
    <a href="emprestimos.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      <span>Empréstimos</span>
    </a>
  </div>
</nav>
 
<main class="main">
  <div class="page-header fade-in">
    <p class="breadcrumb">Circulação</p>
    <h2>Empréstimos</h2>
    <p id="page-subtitle">Controle de retiradas e devoluções</p>
  </div>
  <div class="content fade-in" id="main-content"></div>
</main>
 
<div id="toast-container"></div>
<script type="module">
import { listarEmprestimos, criarEmprestimo, devolverLivro, deletarEmprestimo, listarLivros, listarUsuarios } from "./js/api.js";
import { toast, initPage, isAdmin, fmtDate } from "./js/utils.js";
 
initPage();
 
const content = document.getElementById("main-content");
const admin = isAdmin();
 
if (admin) {
  renderAdmin();
} else {
  renderUser();
}
 
// ─── ADMIN VIEW: histórico completo + gestão + novo empréstimo ──────────
function renderAdmin() {
  content.innerHTML = `
    <div class="stats-row" style="grid-template-columns:1fr 1fr;max-width:480px;margin-bottom:32px">
      <div class="stat-card"><p class="stat-label">Total</p><p class="stat-value" id="count-emprestimos">—</p></div>
      <div class="stat-card"><p class="stat-label">Em andamento</p><p class="stat-value" id="count-ativos">—</p></div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <h3>Histórico de empréstimos</h3>
          <span class="role-badge role-badge--admin">Admin</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Livro</th><th>Usuário</th><th>Data</th><th>Status</th><th></th></tr></thead>
            <tbody id="emprestimos-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Novo Empréstimo</h3></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="field">
              <label for="livroId">Livro disponível</label>
              <select id="livroId"><option value="">Carregando…</option></select>
            </div>
            <div class="field">
              <label for="usuarioId">Usuário</label>
              <select id="usuarioId"><option value="">Carregando…</option></select>
            </div>
            <button id="btn-emprestar" class="btn btn-primary">Registrar Empréstimo</button>
          </div>
        </div>
      </div>
    </div>
  `;
  loadSelects();
  loadHistorico();
  document.getElementById("btn-emprestar").addEventListener("click", submitEmprestimo);
}
 
async function loadSelects() {
  const [livros, usuarios] = await Promise.all([listarLivros(), listarUsuarios()]);
  const disponiveis = livros.filter(l => l.disponivel);
  document.getElementById("livroId").innerHTML =
    `<option value="">Selecionar livro…</option>` +
    disponiveis.map(l => `<option value="${l.id}">${l.titulo}</option>`).join("");
  document.getElementById("usuarioId").innerHTML =
    `<option value="">Selecionar usuário…</option>` +
    usuarios.map(u => `<option value="${u.id}">${u.nome}</option>`).join("");
}
 
async function loadHistorico() {
  const tbody = document.getElementById("emprestimos-tbody");
  tbody.innerHTML = `<tr><td colspan="5"><div class="skeleton" style="width:70%"></div></td></tr>`;
  try {
    const emp = await listarEmprestimos();
    document.getElementById("count-emprestimos").textContent = emp.length;
    document.getElementById("count-ativos").textContent = emp.filter(e => e.ativo).length;
    if (!emp.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🔄</div><p>Nenhum empréstimo registrado</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = emp.map(e => `
      <tr>
        <td><strong>${e.tituloLivro ?? "—"}</strong></td>
        <td>${e.nomeUsuario ?? "—"}</td>
        <td>${fmtDate(e.dataEmprestimo)}</td>
        <td><span class="badge ${e.ativo ? "badge-active" : "badge-available"}"><span class="badge-dot"></span>${e.ativo ? "Em andamento" : "Devolvido"}</span></td>
        <td style="display:flex;gap:8px">
          ${e.ativo ? `<button class="btn btn-ghost btn-sm btn-devolver" data-id="${e.id}">Devolver</button>` : ""}
          <button class="btn btn-danger btn-sm btn-delete" data-id="${e.id}">Remover</button>
        </td>
      </tr>
    `).join("");
    document.querySelectorAll(".btn-devolver").forEach(btn => {
      btn.addEventListener("click", async () => {
        try { await devolverLivro(btn.dataset.id); toast("Devolução registrada"); loadHistorico(); loadSelects(); }
        catch (e) { toast(e.message, "error"); }
      });
    });
    document.querySelectorAll(".btn-delete").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("Remover este empréstimo?")) return;
        try { await deletarEmprestimo(btn.dataset.id); toast("Empréstimo removido"); loadHistorico(); }
        catch (e) { toast(e.message, "error"); }
      });
    });
  } catch {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">⚠</div><p>Erro ao carregar empréstimos</p></div></td></tr>`;
  }
}
 
async function submitEmprestimo() {
  const btn = document.getElementById("btn-emprestar");
  const livroId = document.getElementById("livroId").value;
  const usuarioId = document.getElementById("usuarioId").value;
  if (!livroId || !usuarioId) { toast("Selecione livro e usuário.", "error"); return; }
  btn.disabled = true; btn.textContent = "Registrando…";
  try {
    await criarEmprestimo({ usuarioId: Number(usuarioId), livroId: Number(livroId) });
    toast("Empréstimo registrado");
    loadHistorico(); loadSelects();
  } catch (e) { toast(e.message, "error"); }
  finally { btn.disabled = false; btn.textContent = "Registrar Empréstimo"; }
}
 
// ─── USER VIEW: retirar livro (no próprio nome) + histórico pessoal ─────
let currentUserId = null; // ID resolvido pelo email do token
 
async function renderUser() {
  document.getElementById("page-subtitle").textContent = "Seus empréstimos";
  content.innerHTML = `
    <div class="user-emp-layout">
 
      <!-- Card: Retirar livro -->
      <div class="card user-emp-form-card">
        <div class="card-header"><h3>Retirar um livro</h3></div>
        <div class="card-body">
          <p class="user-emp-hint">Escolha um título disponível para retirar no seu nome.</p>
          <div class="form-grid" style="margin-top:20px">
            <div class="field">
              <label for="livroId">Livro disponível</label>
              <select id="livroId"><option value="">Carregando…</option></select>
            </div>
            <button id="btn-emprestar" class="btn btn-primary btn-full" disabled>
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg>
              Confirmar Retirada
            </button>
          </div>
        </div>
      </div>
 
      <!-- Card: Meu histórico -->
      <div class="card">
        <div class="card-header">
          <h3>Meus empréstimos</h3>
          <div style="display:flex;gap:8px">
            <span id="pill-ativos" class="disp-pill">—</span>
            <span id="pill-total" class="disp-pill" style="opacity:.5">— total</span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Livro</th><th>Retirada</th><th>Status</th></tr></thead>
            <tbody id="user-emp-tbody"></tbody>
          </table>
        </div>
      </div>
 
    </div>
  `;
 
  // Resolve o ID do usuário logado pelo email do token, depois carrega tudo
  await resolveCurrentUser();
  document.getElementById("btn-emprestar").addEventListener("click", submitUserEmprestimo);
}
 
async function resolveCurrentUser() {
  try {
    const { getEmail } = await import("./js/auth.js");
    const emailLogado = getEmail();
    const usuarios = await listarUsuarios();
    const eu = usuarios.find(u => u.email === emailLogado);
    if (eu) {
      currentUserId = eu.id;
      document.getElementById("btn-emprestar").disabled = false;
    } else {
      toast("Não foi possível identificar sua conta.", "error");
    }
    await Promise.all([loadUserLivros(), loadUserEmprestimos()]);
  } catch {
    toast("Erro ao carregar dados.", "error");
  }
}
 
async function loadUserLivros() {
  const sel = document.getElementById("livroId");
  try {
    const livros = await listarLivros();
    const disponiveis = livros.filter(l => l.disponivel);
    if (!disponiveis.length) {
      sel.innerHTML = `<option value="">Nenhum livro disponível no momento</option>`;
      document.getElementById("btn-emprestar").disabled = true;
      return;
    }
    sel.innerHTML =
      `<option value="">Selecione um livro…</option>` +
      disponiveis.map(l => `<option value="${l.id}">${l.titulo} — ${l.autor}</option>`).join("");
  } catch {
    sel.innerHTML = `<option value="">Erro ao carregar livros</option>`;
  }
}
 
async function loadUserEmprestimos() {
  const tbody = document.getElementById("user-emp-tbody");
  tbody.innerHTML = `<tr><td colspan="3"><div class="skeleton" style="width:60%"></div></td></tr>`;
  try {
    const todos = await listarEmprestimos();
    // Filtra apenas os do usuário logado
    const meus = todos.filter(e => e.usuarioId === currentUserId || e.nomeUsuario === document.querySelector(".account-email")?.textContent);
    const ativos = meus.filter(e => e.ativo);
 
    document.getElementById("pill-ativos").textContent =
      `${ativos.length} ativo${ativos.length !== 1 ? "s" : ""}`;
    document.getElementById("pill-total").textContent =
      `${meus.length} total`;
 
    if (!meus.length) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">📖</div><p>Você ainda não fez nenhum empréstimo</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = meus.map(e => `
      <tr>
        <td><strong>${e.tituloLivro ?? "—"}</strong></td>
        <td>${fmtDate(e.dataEmprestimo)}</td>
        <td>
          <span class="badge ${e.ativo ? "badge-active" : "badge-available"}">
            <span class="badge-dot"></span>
            ${e.ativo ? "Em andamento" : "Devolvido"}
          </span>
        </td>
      </tr>
    `).join("");
  } catch {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="empty-icon">⚠</div><p>Erro ao carregar</p></div></td></tr>`;
  }
}
 
async function submitUserEmprestimo() {
  const btn = document.getElementById("btn-emprestar");
  const livroId = document.getElementById("livroId").value;
  if (!livroId) { toast("Selecione um livro.", "error"); return; }
  if (!currentUserId) { toast("Usuário não identificado.", "error"); return; }
 
  btn.disabled = true;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .7s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Confirmando…`;
  try {
    await criarEmprestimo({ usuarioId: currentUserId, livroId: Number(livroId) });
    toast("Retirada confirmada! Boas leituras. 📚");
    await Promise.all([loadUserLivros(), loadUserEmprestimos()]);
  } catch (e) {
    toast(e.message, "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg> Confirmar Retirada`;
  }
}
</script>
</body>
</html>
